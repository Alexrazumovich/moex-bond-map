name: Update ratings

on:
  schedule:
    - cron: '0 0 * * *'  # Каждую ночь в 03:00 МСК (00:00 UTC)
  workflow_dispatch:      # Ручной запуск из вкладки Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ratings
        run: python fetch_ratings.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ratings.json
          git diff --staged --quiet || git commit -m "chore: update ratings.json [skip ci]"
          git push
